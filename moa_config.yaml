# MoA — Multi-layer Mixture of Agents Config
# OpenRouter free models + Google Gemini (2026)

general:
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  retry_attempts: 5

proposers:
  # OpenRouter models (через один API ключ)
  - name: nemotron_super
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 1.0

  - name: gemma_4_31b
    provider: openrouter
    model: google/gemma-4-31b-it:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 0.9

  # Gemini (прямой API, отдельный лимит)
  - name: gemini_flash
    provider: gemini
    model: gemini-2.0-flash
    key_env: GEMINI_API_KEY
    weight: 1.0

  - name: gemini_flash_lite
    provider: gemini
    model: gemini-2.0-flash-lite
    key_env: GEMINI_API_KEY
    weight: 0.8

aggregators_layer1:
  - name: llama_3_3_70b
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 1.0

  - name: gemini_15_flash
    provider: gemini
    model: gemini-1.5-flash
    key_env: GEMINI_API_KEY
    weight: 0.9

final_aggregator:
  name: laguna_xs_2
  provider: openrouter
  model: poolside/laguna-xs.2:free
  key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  self_critique: false

quality:
  enabled: false
  top_k_layer1: 2
  metrics:
    length_weight: 0.15
    diversity_weight: 0.25
    model_weight: 0.20
    coherence_weight: 0.25
    completeness_weight: 0.15
  judge_model:
    name: quality_judge
    provider: openrouter
    model: google/gemma-4-26b-a4b-it:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

cache:
  enabled: true
  ttl_seconds: 3600
  backend: memory
