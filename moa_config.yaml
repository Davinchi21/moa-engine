# MoA — Multi-layer Mixture of Agents Config
# Бесплатные модели OpenRouter (2026)

general:
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  retry_attempts: 5

proposers:
  - name: qwen_3_235b
    provider: openrouter
    model: qwen/qwen3-235b-a22b:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 1.0

  - name: llama_4_maverick
    provider: openrouter
    model: meta-llama/llama-4-maverick:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 0.9

  - name: gemma_4_27b
    provider: openrouter
    model: google/gemma-4-27b-it:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 0.8

aggregators_layer1:
  - name: deepseek_v3
    provider: openrouter
    model: deepseek/deepseek-chat-v3-0324:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    weight: 1.0

final_aggregator:
  name: llama_3_3_70b
  provider: openrouter
  model: meta-llama/llama-3.3-70b-instruct:free
  key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  self_critique: false

quality:
  enabled: false
  top_k_layer1: 2
  metrics:
    length_weight: 0.15
    diversity_weight: 0.25
    model_weight: 0.20
    coherence_weight: 0.25
    completeness_weight: 0.15
  judge_model:
    name: quality_judge
    provider: openrouter
    model: google/gemma-4-26b-a4b-it:free
    key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

cache:
  enabled: true
  ttl_seconds: 3600
  backend: memory
